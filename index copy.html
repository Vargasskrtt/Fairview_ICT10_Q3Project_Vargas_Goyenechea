<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intramural Team Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    body {
      background-image: url('https://wallpaperaccess.com/full/385739.jpg'); # This sets a sporty wallpaper so the page looks exciting
      color: white; # Makes all text white so it stands out on the dark background
      text-align: center; # Centers everything neatly in the middle
    }

    header {
      background-color: rgba(255,255,255,0.92); # A white bar at the top so the logo and links are easy to see
      position: sticky; top: 0; # Keeps the header stuck at the top when you scroll
      backdrop-filter: blur(6px); # Adds a blur effect behind the header for style
    }
    .header-left img {
      height: 70px; # This is the school logo, sized to fit nicely
    }
    .header-nav a.home:hover { color: red; } # When you hover on Home, it turns red
    .header-nav a.signup:hover { color: green; } # Hover on Sign Up, it turns green
    .header-nav a.teamchecker:hover { color: goldenrod; } # Hover on Team Checker, it turns gold
    .header-nav a.players:hover { color: blue; } # Hover on Players, it turns blue

    .form-container {
      background-color: white; # The form sits inside a clean white box
      border-radius: 10px; # Rounded corners so it doesn’t look too sharp
      border-image: linear-gradient(to right, yellow, green, blue, red) 1; # Rainbow border to make it colorful
    }

    button {
      background: linear-gradient(to right, #FFF0B3, #FFB3B3, #B3FFB3, #B3D1FF); # The button has a rainbow gradient too
    }
    button:hover { transform: scale(1.05); } # When you hover, the button grows a little — fun effect

    #result {
      font-size: 22px; # The result message is big so it’s easy to read
    }
    .ok { color: #00B894; } # If it’s a success, the message shows in green
    .bad { color: #D63031; } # If it’s an error, the message shows in red
    .mascot {
      max-width: 200px; # Mascot image is kept at a nice size
    }

    footer::after {
      background: linear-gradient(90deg, red, green, yellow, blue); # A rainbow line under the footer for decoration
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="https://files.orangeapps.ph/...png" alt="School Logo"> # Shows the school logo at the top
    </div>
    <nav class="header-nav">
      <a href="index.html" class="home">Home</a>
      <a href="index(1).html" class="signup">My Sign Up</a>
      <a href="index copy.html" class="teamchecker">My Team Checker</a>
      <a href="Players.html" class="players">Players</a>
    </nav>
  </header>

  <div class="form-container">
    <form id="eligibilityForm">
      <select id="registration" required> # Dropdown where you pick if you registered online
        <option value="">Select</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <select id="medical" required> # Dropdown for medical clearance
        <option value="">Select</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <select id="grade" required> # Dropdown for grade level
        <option value="">Select Grade</option>
        <option value="7">Grade 7</option>
        <option value="8">Grade 8</option>
        <option value="9">Grade 9</option>
        <option value="10">Grade 10</option>
        <option value="11">Grade 11</option>
      </select>

      <select id="section" required> # Dropdown for section
        <option value="">Select Section</option>
        <option value="Emerald">Emerald</option>
        <option value="Ruby">Ruby</option>
        <option value="Sapphire">Sapphire</option>
        <option value="Topaz">Topaz</option>
        <option value="Jade">Jade</option>
      </select>

      <button type="submit">Check Eligibility</button> # The button you click to check if you’re allowed to join
    </form>
    <div id="result"></div> # This empty box is where the result will show up
  </div>

  <footer>
    <p>2025–2026 Intramurals Project</p>
  </footer>

  <script>
    const teams = ["Blue Bears", "Red Bulldogs", "Yellow Tigers", "Green Hornets"]; # A list of all possible teams

    document.getElementById('eligibilityForm').addEventListener('submit', function (e) {
      e.preventDefault(); # Stops the page from refreshing when you hit submit

      # Grab all the answers from the dropdowns
      const registration = document.getElementById('registration').value.toLowerCase();
      const medical = document.getElementById('medical').value.toLowerCase();
      const gradeVal = document.getElementById('grade').value;
      const section = document.getElementById('section').value;
      const resultEl = document.getElementById('result');

      # Now we check the answers step by step
      if (registration === "yes") { # First check: did you register?
        if (medical === "yes") { # Second check: do you have medical clearance?
          if (gradeVal && Number(gradeVal) >= 7 && Number(gradeVal) <= 10) { # Third check: are you in Grade 7–10?
            const team = teams[Math.floor(Math.random() * teams.length)]; # If yes, we randomly assign you a team
            let logo = "";

            # Depending on the team, we show the right mascot
            if (team === "Blue Bears") {
              logo = "BlueBears.html";
            } else if (team === "Red Bulldogs") {
              logo = "RedBulldogs.html";
            } else if (team === "Yellow Tigers") {
              logo = "YellowTigers.html";
            } else if (team === "Green Hornets") {
              logo = "GreenHornets.html";
            }

            resultEl.className = "ok"; # Marks the result as success (green)
            resultEl.innerHTML = `
              🎉 Congratulations! You are eligible...<br>
              Team: <strong>${team}</strong><br>
              Section: <strong>${section}</strong><br><br>
              <img src="${logo}" alt="${team} Logo" class="mascot"><br> # Shows the mascot image
              <img src="https://www.pngplay.com/...Smiley-Ball.png" style="width:80px;"> # This adds a smiley face for fun
              <span style="color:gold;">Have Fun!</span> # Shows a gold “Have Fun!” message
            `;
          } else {
            resultEl.className = "bad"; # Marks the result as error (red)
            resultEl.textContent = "Sorry, only students from Grade 7 to Grade 10 are eligible."; # Shows error message
          }
        } else {
          resultEl.className = "bad"; # Error if no medical clearance
          resultEl.textContent = "Sorry, you must have medical clearance to join the Intramurals.";
        }
      } else {
        resultEl.className = "bad"; # Error if not registered
        resultEl.textContent = "Sorry, you must complete the online registration to be eligible.";
      }
    });
  </script>
</body>
</html>
