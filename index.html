<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intramurals Website</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Anton', sans-serif;
      color: #222;
      background: url('https://image.slidesdocs.com/responsive-images/background/red-motion-advertising-houses-sport-powerpoint-background_e8700372a3__960_540.jpg')
        no-repeat center center fixed;
      background-size: cover;
    }

    header {
      background-color: rgba(255,255,255,0.92);
      padding: 12px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }

    .header-left img {
      height: 70px;
    }

    .header-nav a {
      margin: 0 14px;
      text-decoration: none;
      color: #222;
      font-weight: 600;
      font-size: 0.95em;
      transition: all 0.3s ease;
      padding: 6px 10px;
      border-radius: 6px;
    }

    /* Individual hover colors */
    .header-nav a.home:hover {
      color: red;
    }
    .header-nav a.signup:hover {
      color: green;
    }
    .header-nav a.teamchecker:hover {
      color: goldenrod;
    }
    .header-nav a.players:hover {
      color: blue;
    }

    /* Hero section with regular solid font color */
    .hero {
      text-align: center;
      margin: 50px auto;
      width: 85%;
      padding: 40px;
      border-radius: 15px;
      background-color: rgba(255,255,255,0.85);
    }

    .hero h2 {
      font-size: 3em;
      margin-bottom: 25px;
      color: #222; /* regular solid font color */
    }

    .hero p {
      font-size: 1.2em;
      max-width: 750px;
      margin: auto;
      margin-top: 10px;
      color: #333;
    }

    .nav-section {
      background-color: rgba(255,255,255,0.92);
      border-radius: 14px;
      margin: 45px auto;
      padding: 30px;
      width: 85%;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      text-align: center;
    }

    .nav-section h3 {
      font-size: 2.2em;
      margin-bottom: 20px;
      color: #222;
    }

    .nav-images {
      display: flex;
      justify-content: center;
      gap: 25px;
    }

    .nav-images .photo-block {
      text-align: center;
      padding: 15px;
      border-radius: 12px;
      width: 250px;
    }

    .nav-images img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid #ccc;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .nav-images p {
      margin-top: 8px;
      font-size: 0.9em;
      color: #333;
    }

    /* Team-color backgrounds */
    .redbulldogs { background-color: rgba(255,0,0,0.15); }
    .greenhornets { background-color: rgba(0,128,0,0.15); }
    .yellowtigers { background-color: rgba(255,215,0,0.25); }
    .bluebears { background-color: rgba(0,0,255,0.15); }

    /* Glow hover effects per mascot */
    .redbulldogs img:hover { border-color: red; box-shadow: 0 0 15px red; }
    .greenhornets img:hover { border-color: green; box-shadow: 0 0 15px green; }
    .yellowtigers img:hover { border-color: gold; box-shadow: 0 0 15px gold; }
    .bluebears img:hover { border-color: blue; box-shadow: 0 0 15px blue; }

    footer {
      text-align: center;
      font-size: 0.9em;
      color: #333;
      padding: 25px 0;
      background-color: rgba(255,255,255,0.92);
      margin-top: 40px;
      position: relative;
    }

    footer::after {
      content: "";
      display: block;
      height: 6px;
      background: linear-gradient(90deg, red, green, yellow, blue);
      margin-top: 10px;
    }

    footer p {
      margin: 5px 0;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-left">
      <img src="https://files.orangeapps.ph/disk001/School_Files/1/school-65/school_profile/1687002413-822.png" alt="School Logo">
    </div>

    <nav class="header-nav">
      <a href="#" class="home">Home</a>
      <a href="Account.html" class="signup">Sign Up</a>
      <a href="index copy.html" class="teamchecker">Team Checker</a>
      <a href="Players.html" class="players">Players</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Welcome to the Intramurals Website</h2>
  </section>

  <section class="nav-section">
    <h3>Intramurals Teams</h3>
    <div class="nav-images">
      <div class="photo-block redbulldogs">
        <img src="RedBulldogs.html" alt="Red Bulldogs">
        <p>Red Bulldogs</p>
      </div>
      <div class="photo-block greenhornets">
        <img src="GreenHornets.html" alt="Green Hornets">
        <p>Green Hornets</p>
      </div>
      <div class="photo-block yellowtigers">
        <img src="YellowTigers.html" alt="Yellow Tigers">
        <p>Yellow Tigers</p>
      </div>
      <div class="photo-block bluebears">
        <img src="BlueBears.html" alt="Blue Bears">
        <p>Blue Bears</p>
      </div>
    </div>
  </section>

  <footer>
    <p> 2025–2026 Intramurals Project</p>
  </footer>

</body>
</html>
