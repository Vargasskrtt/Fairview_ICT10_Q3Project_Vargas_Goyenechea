<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intramurals Players</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Anton', sans-serif;
      margin: 0;
      background: url('https://image.slidesdocs.com/responsive-images/slides/0-gray-plan-year-end-summary-business-sports-physical-education-competition-multi-purpose-creative-style-powerpoint-background_2a7a7393b5__960_540.jpg')
        no-repeat center center fixed;
      background-size: cover;
      color: #222;
    }

    /* Homepage-style header */
    header {
      background-color: rgba(255,255,255,0.95);
      padding: 15px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid;
      border-image: linear-gradient(90deg, red, yellow, green, blue) 1;
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }
    .header-left img {
      height: 65px;
    }
    .header-nav a {
      margin: 0 14px;
      text-decoration: none;
      color: #222;
      font-weight: 600;
      font-size: 1em;
      transition: all 0.3s ease;
      padding: 6px 10px;
      border-radius: 6px;
    }
    .header-nav a.home:hover { color: red; }
    .header-nav a.signup:hover { color: green; }
    .header-nav a.teamchecker:hover { color: goldenrod; }
    .header-nav a.players:hover { color: blue; }

    h2 {
      margin: 40px 0 20px;
      text-align: center;
      color: #222;
    }
    ul {
      list-style: none;
      padding: 0;
      max-width: 600px;
      margin: auto;
    }
    li {
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background-color: rgba(255,255,255,0.85);
      font-size: 1.1em;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      /* Glow effect */
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
    }
    li:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255,255,255,1);
    }

    /* Homepage-style footer */
    footer {
      text-align: center;
      font-size: 0.9em;
      color: #333;
      padding: 20px 0;
      background-color: rgba(255,255,255,0.95);
      margin-top: 50px;
      border-top: 4px solid;
      border-image: linear-gradient(90deg, red, yellow, green, blue) 1;
    }
    footer p { margin: 5px 0; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <img src="https://files.orangeapps.ph/disk001/School_Files/1/school-65/school_profile/1687002413-822.png" alt="School Logo">
    </div>
    <nav class="header-nav">
      <a href="index.html" class="home">Home</a>
      <a href="index(1).html" class="signup">My Sign Up</a>
      <a href="index copy.html" class="teamchecker">My Team Checker</a>
      <a href="Players.html" class="players">Players</a>
    </nav>
  </header>

  <h2>List of Players (28)</h2>
  <ul id="playerList"></ul>

  <!-- Footer -->
  <footer>
    <p>2025–2026 Intramurals Project</p>
  </footer>

  <script>
    const players = [
      "Adrian Gavina","Alexander Joel Janayan","Alexandra Vargas","Arabella Lubo","Audrey Tan",
      "Cyrene Brion","Emille Barcelona","Fateh Singh","Gavin Francisco","Gianna Entrada",
      "Ioana Biel B. Haberia","Jabez Libutan","Jairo James Agudo","Janine Mariposque",
      "Karla Cassandra Del Prado","Lian Candice Castro","Lucas Reyes","Luisa Manuel",
      "Matthew Banaag","Miguel Buo","Mikko Alaiza","Naser A Al Hazmi","Rycob Pagtalunan",
      "Shia Adam Jayzen Cruz","Sofia Guevarra","Tyronne Jaiho Subaan","Xylee Goyenechea",
      "Zaldivar James Guile Zaldivar"
    ];

    // this was sort alphabetically by last name
    players.sort((a, b) => {
      const lastA = a.split(" ").slice(-1)[0].toLowerCase();
      const lastB = b.split(" ").slice(-1)[0].toLowerCase();
      if (lastA < lastB) return -1;
      if (lastA > lastB) return 1;
      return 0;
    });

    const list = document.getElementById("playerList");
    for (let i = 0; i < players.length; i++) {
      const li = document.createElement("li");
      li.textContent = players[i];
      list.appendChild(li);
    }
  </script>

</body>
</html>
