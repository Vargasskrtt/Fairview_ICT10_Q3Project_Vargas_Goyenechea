<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intramurals Players</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    body {
      background: url('https://image.slidesdocs.com/...jpg') no-repeat center center fixed; # Shows a sports-themed background image
      background-size: cover; # Makes the background stretch to fill the page
      color: #222; # Text is dark gray so it’s readable
    }

    header {
      background-color: rgba(255,255,255,0.95); # White bar at the top for logo and links
      border-image: linear-gradient(90deg, red, yellow, green, blue) 1; # Rainbow line under the header
      position: sticky; top: 0; # Keeps the header visible when scrolling
      backdrop-filter: blur(6px); # Adds a blur effect behind the header
    }
    .header-left img {
      height: 65px; # Displays the school logo at the top
    }
    .header-nav a.home:hover { color: red; } # Home link turns red when hovered
    .header-nav a.signup:hover { color: green; } # Sign Up link turns green when hovered
    .header-nav a.teamchecker:hover { color: goldenrod; } # Team Checker link turns gold when hovered
    .header-nav a.players:hover { color: blue; } # Players link turns blue when hovered

    h2 {
      text-align: center; # Centers the title “List of Players”
    }
    ul {
      max-width: 600px; margin: auto; # Keeps the list centered and not too wide
    }
    li {
      background-color: rgba(255,255,255,0.85); # Each player’s name sits in a white box
      box-shadow: 0 0 10px rgba(255,255,255,0.8); # Adds a glowing effect around each name
    }
    li:hover {
      transform: scale(1.05); # Names grow slightly when hovered
      box-shadow: 0 0 20px rgba(255,255,255,1); # Glow gets brighter when hovered
    }

    footer {
      background-color: rgba(255,255,255,0.95); # White footer bar at the bottom
      border-image: linear-gradient(90deg, red, yellow, green, blue) 1; # Rainbow line above the footer
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <img src="https://files.orangeapps.ph/...png" alt="School Logo"> # Shows the school logo
    </div>
    <nav class="header-nav">
      <a href="index.html" class="home">Home</a>
      <a href="index(1).html" class="signup">My Sign Up</a>
      <a href="index copy.html" class="teamchecker">My Team Checker</a>
      <a href="Players.html" class="players">Players</a>
    </nav>
  </header>

  <h2>List of Players (28)</h2> # Title showing how many players are listed
  <ul id="playerList"></ul> # Empty list where names will be added

  <footer>
    <p>2025–2026 Intramurals Project</p> # Footer text at the bottom
  </footer>

  <script>
    const players = [ ... ]; # Stores all 28 player names

    players.sort((a, b) => { # Sorts the names alphabetically by last name
      const lastA = a.split(" ").slice(-1)[0].toLowerCase();
      const lastB = b.split(" ").slice(-1)[0].toLowerCase();
      if (lastA < lastB) return -1;
      if (lastA > lastB) return 1;
      return 0;
    });

    const list = document.getElementById("playerList"); # Finds the empty list on the page
    for (let i = 0; i < players.length; i++) { # LOOP: Goes through each player one by one
      const li = document.createElement("li"); # Makes a new list item
      li.textContent = players[i]; # Puts the player’s name inside the list item
      list.appendChild(li); # Adds the list item to the page so it shows up
    }
  </script>

</body>
</html>
