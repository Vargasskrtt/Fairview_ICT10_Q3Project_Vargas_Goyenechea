<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Anton', sans-serif;
      background: url('https://i.pinimg.com/736x/e7/fe/2b/e7fe2be09fb12d2d379ef74d031aa595.jpg')
        no-repeat center center fixed;
      background-size: cover;
      text-align: center;
      color: #222;
    }

    /* Header (same as Players page) */
    header {
      background-color: rgba(255,255,255,0.95);
      padding: 15px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid;
      border-image: linear-gradient(90deg, red, yellow, green, blue) 1;
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }
    .header-left img {
      height: 65px;
    }
    .header-nav a {
      margin: 0 14px;
      text-decoration: none;
      color: #222;
      font-weight: 600;
      font-size: 1em;
      transition: all 0.3s ease;
      padding: 6px 10px;
      border-radius: 6px;
    }
    .header-nav a.home:hover { color: red; }
    .header-nav a.signup:hover { color: green; }
    .header-nav a.teamchecker:hover { color: goldenrod; }
    .header-nav a.players:hover { color: blue; }

    /* Form container */
    .form-container {
      margin: 60px auto;
      width: 50%;
      background-color: rgba(255,255,255,0.9);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }
    h1 {
      font-size: 40px;
      color: #FF73B7;
      text-shadow: 0 0 10px #FF73B7;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }
    input {
      padding: 10px;
      width: 80%;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 18px;
      text-align: center;
    }
    button {
      display: block;
      margin: 20px auto;
      padding: 12px 25px;
      background: #FF73B7;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: all 0.3s ease;
      font-size: 18px;
    }
    button:hover {
      transform: scale(1.05);
      background: #e85fa3;
      box-shadow: 0 0 12px rgba(255,115,183,0.8);
    }
    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }
    .ok { color: #00B894; }
    .bad { color: #D63031; }

    /* Footer (same as Players page) */
    footer {
      text-align: center;
      font-size: 0.9em;
      color: #333;
      padding: 20px 0;
      background-color: rgba(255,255,255,0.95);
      margin-top: 60px;
      border-top: 4px solid;
      border-image: linear-gradient(90deg, red, yellow, green, blue) 1;
    }
    footer p { margin: 5px 0; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <img src="https://files.orangeapps.ph/disk001/School_Files/1/school-65/school_profile/1687002413-822.png" alt="School Logo">
    </div>
    <nav class="header-nav">
      <a href="index.html" class="home">Home</a>
      <a href="Account.html" class="signup">My Sign Up</a>
      <a href="index copy.html" class="teamchecker">My Team Checker</a>
      <a href="Players.html" class="players">Players</a>
    </nav>
  </header>

  <!-- Sign Up Form -->
  <div class="form-container">
    <h1>Create Account</h1>
    <form id="accountForm">
      <label>Username:</label>
      <input type="text" id="username" required>
      <label>Password:</label>
      <input type="password" id="password" required>
      <button type="submit">Sign Up</button>
    </form>
    <div id="result"></div>
  </div>

  <!-- Footer -->
  <footer>
    <p>2025–2026 Intramurals Project</p>
  </footer>

  <script>
    document.getElementById('accountForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const resultEl = document.getElementById('result');

      if (username === "") {
        resultEl.className = "bad";
        resultEl.textContent = "❌ Username cannot be empty.";
      } else if (username.length < 7) {
        const needed = 7 - username.length;
        resultEl.className = "bad";
        resultEl.textContent = `❌ Your username is too short. Add ${needed} more character(s).`;
      } else if (password.length < 10) {
        const needed = 10 - password.length;
        resultEl.className = "bad";
        resultEl.textContent = `❌ Your password is too short. Add ${needed} more character(s).`;
      } else if (!(/[0-9]/.test(password) && /[a-zA-Z]/.test(password))) {
        resultEl.className = "bad";
        resultEl.textContent = "❌ Password must contain both letters and numbers.";
      } else {
        resultEl.className = "ok";
        resultEl.textContent = `🎉 Account created successfully for ${username}!`;
      }
    });
  </script>
</body>
</html>
